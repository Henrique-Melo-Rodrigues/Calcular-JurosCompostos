<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Calculadora de Juros Compostos</title>
        <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
        <link rel="stylesheet" href="style.css" />
        <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    </head>
    <body>
        <main class="app">
            <section class="intro">
                <p class="eyebrow">Python + PyScript</p>
                <h1>Calculadora de Juros Compostos</h1>
                <p>
                    Simule investimentos usando taxas anuais fixas de Selic, CDI, IPCA
                    ou poupanca. Os valores sao exemplos hardcoded para fins academicos.
                </p>
            </section>

            <section class="calculator" aria-label="Formulario da calculadora">
                <form id="calculator-form" class="form">
                    <label>
                        Valor inicial
                        <input
                            id="initial-value"
                            type="number"
                            min="0"
                            step="0.01"
                            value="1000"
                            placeholder="Ex: 1000"
                        />
                    </label>

                    <label>
                        Aporte mensal
                        <input
                            id="monthly-contribution"
                            type="number"
                            min="0"
                            step="0.01"
                            value="100"
                            placeholder="Ex: 100"
                        />
                    </label>

                    <label>
                        Periodo em meses
                        <input
                            id="months"
                            type="number"
                            min="1"
                            step="1"
                            value="12"
                            placeholder="Ex: 12"
                        />
                    </label>

                    <label>
                        Taxa hardcoded
                        <select id="rate-type">
                            <option value="selic">Selic - 10,50% ao ano</option>
                            <option value="cdi">CDI - 10,40% ao ano</option>
                            <option value="ipca">IPCA - 4,50% ao ano</option>
                            <option value="poupanca">Poupanca - 6,17% ao ano</option>
                        </select>
                    </label>

                    <button type="submit">Calcular</button>
                </form>

                <p id="error-message" class="error" role="alert"></p>
            </section>

            <section class="results" aria-live="polite">
                <div id="summary" class="summary"></div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Mes</th>
                                <th>Juros do mes</th>
                                <th>Total investido</th>
                                <th>Total de juros</th>
                                <th>Total acumulado</th>
                            </tr>
                        </thead>
                        <tbody id="result-table">
                            <tr>
                                <td colspan="5">Preencha os campos e clique em calcular.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>

        <script type="py" src="./main.py"></script>
    </body>
</html>
